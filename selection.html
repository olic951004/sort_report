<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選擇排序（Selection Sort）</title>

  <style>
    body{
      font-family:"Microsoft JhengHei",system-ui,sans-serif;
      background:#f8fafc;
      padding:24px;
    }
    .nav-links a{
      display:inline-block;
      margin-bottom:16px;
      padding:8px 16px;
      background:#2563eb;
      color:#fff;
      text-decoration:none;
      border-radius:9999px;
    }
    .container{
      background:#fff;
      border-radius:16px;
      padding:24px;
      box-shadow:0 20px 40px rgba(0,0,0,.08);
      max-width:900px;
      margin:auto;
    }
    #bars{
      display:flex;
      align-items:flex-end;
      gap:8px;
      height:240px;
      margin-top:24px;
    }
    .bar{
      width:40px;
      background:#2563eb;
      color:#fff;
      text-align:center;
      border-radius:6px 6px 0 0;
    }
  </style>
</head>

<body>

  <nav class="nav-links">
    <a href="index.html">← 回首頁</a>
  </nav>

  <div class="container">
    <h1>選擇排序（Selection Sort）</h1>
    <p>
      選擇排序每一輪會從尚未排序的區域中找出最小值，
      再與該區域的第一個元素交換位置。
    </p>

    <div id="bars"></div>
  </div>

  <script>
    const arr = [60, 30, 90, 20, 80, 40];
    const bars = document.getElementById('bars');
    const max = Math.max(...arr);

    function render(){
      bars.innerHTML = '';
      arr.forEach(v=>{
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.height = (v / max * 200) + 'px';
        bar.textContent = v;
        bars.appendChild(bar);
      });
    }

    render();
  </script>

</body>
</html>
