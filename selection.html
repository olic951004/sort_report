<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>選擇排序（Selection Sort）</title>

<style>
:root{
  --primary:#2563eb;
  --accent:#f59e0b;
  --danger:#ef4444;
  --success:#22c55e;
  --bg:#f8fafc;
  --card:#ffffff;
  --border:#e5e7eb;
}
*{box-sizing:border-box}

body{
  margin:0;
  padding:24px;
  font-family:system-ui,-apple-system,"Microsoft JhengHei",Segoe UI,Arial;
  background:var(--bg);
  color:#0f172a;
}

.container{
  max-width:900px;
  margin:auto;
  background:var(--card);
  border-radius:16px;
  padding:24px;
  box-shadow:0 20px 40px rgba(0,0,0,.08);
}

h1{margin-bottom:6px}
.subtitle{color:#475569;margin-bottom:16px}

/* 原理說明 */
.principle{
  background:#f1f5f9;
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px 20px;
  margin-bottom:20px;
  font-size:14px;
  line-height:1.7;
}
.principle strong{color:var(--accent)}

/* 資訊列 */
.info-bar{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.info-pill{
  background:#f8fafc;
  border:1px solid var(--border);
  border-radius:9999px;
