<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排序演算法視覺化</title>

<style>
:root{
  --primary:#2563eb;
  --accent:#f59e0b;
  --success:#22c55e;
  --bg:#f8fafc;
  --card:#ffffff;
  --border:#e5e7eb;
}
*{box-sizing:border-box}

body{
  margin:0;
  padding:32px 20px;
  font-family:system-ui,-apple-system,"Microsoft JhengHei",Segoe UI,Arial;
  background:var(--bg);
  color:#0f172a;
}

.container{
  max-width:1000px;
  margin:auto;
}

h1{margin-bottom:6px}
.subtitle{color:#475569;margin-bottom:28px}

/* 卡片區 */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:24px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:22px 22px 26px;
  box-shadow:0 10px 25px rgba(0,0,0,.06);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:.25s;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 18px 40px rgba(0,0,0,.12);
}

.card h2{
  margin:6px 0;
  font-size:1.2rem;
}
.card .en{
  color:#64748b;
  font-size:.9rem;
  margin-bottom:10px;
}
.card p{
  font-size:14px;
  line-height:1.6;
  color:#334155;
}

/* 標籤 */
.badge{
  display:inline-block;
  background:#eff6ff;
  color:var(--primary);
  border:1px solid #bfdbfe;
  border-radius:9999px;
  padding:4px 12px;
  font-size:12px;
  margin-bottom:10px;
  width:max-content;
}

/* 連結按鈕 */
.card a{
  margin-top:18px;
  align-self:flex-start;
  text-decoration:none;
  background:var(--primary);
  color:#fff;
  padding:8px 18px;
  border-radius:9999px;
  font-size:14px;
  transition:.2s;
}
.card a:hover{
  background:#1d4ed8;
}

/* Footer */
.footer{
  margin-top:40px;
  text-align:center;
  font-size:13px;
  color:#64748b;
}
</style>
</head>

<body>
<div class="container">

<h1>排序演算法視覺化</h1>
<p class="subtitle">Sorting Algorithm Visualization</p>

<div class="grid">

  <!-- Bubble Sort -->
  <div class="card">
    <div>
      <span class="badge">交換導向</span>
      <h2>氣泡排序</h2>
      <div class="en">Bubble Sort</div>
      <p>
        重複比較相鄰元素，  
        若順序錯誤就交換，  
        讓最大值逐步移至右側。
      </p>
    </div>
    <a href="bubble.html">開始學習 →</a>
  </div>

  <!-- Insertion Sort -->
  <div class="card">
    <div>
      <span class="badge">插入導向</span>
      <h2>插入排序</h2>
      <div class="en">Insertion Sort</div>
      <p>
        將每個元素插入到  
        左側已排序區域的  
        正確位置。
      </p>
    </div>
    <a href="insertion.html">開始學習 →</a>
  </div>

  <!-- Selection Sort -->
  <div class="card">
    <div>
      <span class="badge">選擇導向</span>
      <h2>選擇排序</h2>
      <div class="en">Selection Sort</div>
      <p>
        每一輪從未排序區域  
        找出最小值，  
        與第一個元素交換。
      </p>
    </div>
    <a href="selection.html">開始學習 →</a>
  </div>

</div>

<div class="footer">
  © 排序演算法視覺化｜課程 / 作業 / 專題展示
</div>

</div>
</body>
</html>
