<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排序演算法視覺化</title>

<style>
:root{
  --primary:#2563eb;
  --accent:#f59e0b;
  --danger:#ef4444;
  --success:#22c55e;
  --bg:#f8fafc;
  --card:#ffffff;
  --border:#e5e7eb;
}
*{box-sizing:border-box}

body{
  margin:0;
  padding:24px;
  font-family:system-ui,"Microsoft JhengHei",Segoe UI,Arial;
  background:var(--bg);
  color:#0f172a;
}

.container{
  max-width:1000px;
  margin:auto;
  background:var(--card);
  border-radius:16px;
  padding:24px;
  box-shadow:0 20px 40px rgba(0,0,0,.08);
}

h1{margin-bottom:6px}
.subtitle{color:#475569;margin-bottom:20px}

.selector{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}
.selector button{
  padding:8px 18px;
  border-radius:9999px;
  border:1px solid var(--border);
  background:#f1f5f9;
  cursor:pointer;
}
.selector button.active{
  background:var(--primary);
  color:#fff;
}

.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.controls button{
  padding:8px 16px;
  border:none;
  border-radius:9999px;
  background:var(--primary);
  color:#fff;
}
.controls button.secondary{background:#64748b}
.controls button.warn{background:var(--accent)}

.info{
  margin-bottom:14px;
  font-size:14px;
  color:#475569;
}

.chart{
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  background:#f8fafc;
}
.bars{
  display:flex;
  gap:8px;
  height:260px;
  align-items:flex-end;
  justify-content:center;
}
.bar{
  width:40px;
  background:var(--primary);
  border-radius:6px 6px 0 0;
  transition:.25s;
}
.bar-label{
  text-align:center;
  font-size:12px;
  margin-top:6px;
  color:#475569;
}
</style>
</head>

<body>
<div class="container">

<h1>排序演算法視覺化</h1>
<p class="subtitle">Sorting Algorithm Visualization</p>

<!-- 演算法切換 -->
<div class="selector">
  <button id="btnBubble" class="active" onclick="setAlgo('bubble')">氣泡排序</button>
  <button id="btnInsertion" onclick="setAlgo('insertion')">插入排序</button>
  <button id="btnSelection" onclick="setAlgo('selection')">選擇排序</button>
</div>

<!-- 控制 -->
<div class="controls">
  <button onclick="nextStep()">單步</button>
  <button onclick="reset()">重置</button>
</div>

<p class="info" id="info">請選擇排序演算法</p>

<div class="chart">
  <div class="bars" id="bars"></div>
</div>

</div>

<script>
let algo='bubble';
let arr=[60,30,90,20,80,40];
let step=0;

function setAlgo(a){
  algo=a; step=0;
  document.querySelectorAll('.selector button').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn'+a.charAt(0).toUpperCase()+a.slice(1)).classList.add('active');
  draw();
}

function draw(){
  bars.innerHTML='';
  const max=Math.max(...arr);
  arr.forEach(v=>{
    const col=document.createElement('div');
    const bar=document.createElement('div');
    bar.className='bar';
    bar.style.height=(v/max*220)+'px';
    const lbl=document.createElement('div');
    lbl.className='bar-label';
    lbl.textContent=v;
    col.appendChild(bar);
    col.appendChild(lbl);
    bars.appendChild(col);
  });
  info.textContent=`目前演算法：${algo}`;
}

function nextStep(){
  if(algo==='bubble' && step<arr.length-1){
    if(arr[step]>arr[step+1]){
      [arr[step],arr[step+1]]=[arr[step+1],arr[step]];
    }
    step++;
  }
  draw();
}

function reset(){
  arr=[60,30,90,20,80,40];
  step=0;
  draw();
}

draw();
</script>

</body>
</html>
