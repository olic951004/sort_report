<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排序演算法視覺化</title>

<style>
:root{
  --primary:#2563eb;
  --accent:#f59e0b;
  --bg:#f8fafc;
  --card:#ffffff;
  --border:#e5e7eb;
}
*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,"Microsoft JhengHei",Segoe UI,Arial;
  background:var(--bg);
  color:#0f172a;
}

/* ===== 導覽列 ===== */
.navbar{
  background:#ffffff;
  border-bottom:1px solid var(--border);
}
.nav-inner{
  max-width:1000px;
  margin:auto;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.nav-title{
  font-weight:700;
  font-size:18px;
}
.nav-links{
  display:flex;
  gap:14px;
}
.nav-links a{
  text-decoration:none;
  color:#2563eb;
  font-size:14px;
  padding:6px 14px;
  border-radius:9999px;
  transition:.2s;
}
.nav-links a:hover{
  background:#eff6ff;
}

/* ===== 主內容 ===== */
.container{
  max-width:1000px;
  margin:auto;
  padding:32px 20px;
}
h1{margin-bottom:6px}
.subtitle{
  color:#475569;
  margin-bottom:28px;
}

/* 卡片 */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:24px;
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:22px;
  box-shadow:0 10px 25px rgba(0,0,0,.06);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.card h2{margin:6px 0}
.card .en{
  color:#64748b;
  font-size:.9rem;
  margin-bottom:10px;
}
.card p{
  font-size:14px;
  line-height:1.6;
  color:#334155;
}
.card a{
  margin-top:18px;
  align-self:flex-start;
  text-decoration:none;
  background:#2563eb;
  color:#fff;
  padding:8px 18px;
  border-radius:9999px;
  font-size:14px;
}
.card a:hover{background:#1d4ed8}

/* Footer */
.footer{
  margin-top:40px;
  padding:20px;
  text-align:center;
  font-size:13px;
  color:#64748b;
}
</style>
</head>

<body>

<!-- 導覽列 -->
<header class="navbar">
  <div class="nav-inner">
    <div class="nav-title">排序演算法視覺化</div>
    <nav class="nav-links">
      <a href="index.html">首頁</a>
      <a href="bubble.html">氣泡排序</a>
      <a href="insertion.html">插入排序</a>
      <a href="selection.html">選擇排序</a>
    </nav>
  </div>
</header>

<!-- 首頁內容 -->
<main class="container">
  <h1>Sorting Algorithm Visualization</h1>
  <p class="subtitle">
    本網站透過動畫與互動介面，協助理解常見排序演算法的核心概念。
  </p>

  <div class="cards">
    <div class="card">
      <h2>氣泡排序</h2>
      <div class="en">Bubble Sort</div>
      <p>
        反覆比較相鄰元素，  
        若順序錯誤就交換，  
        讓最大值逐步移動至右側。
      </p>
      <a href="bubble.html">開始學習 →</a>
    </div>

    <div class="card">
      <h2>插入排序</h2>
      <div class="en">Insertion Sort</div>
      <p>
        每次取一個新元素，  
        插入到左側已排序  
        區域的正確位置。
      </p>
      <a href="insertion.html">開始學習 →</a>
    </div>

    <div class="card">
      <h2>選擇排序</h2>
      <div class="en">Selection Sort</div>
      <p>
        每一輪從未排序區域  
        找出最小值，  
        與第一個元素交換。
      </p>
      <a href="selection.html">開始學習 →</a>
    </div>
  </div>
</main>

<footer class="footer">
  © 排序演算法視覺化 ｜ 作業 / 課堂 / 專題展示
</footer>

</body>
</html>
