<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>氣泡排序（Bubble Sort）</title>

<style>
:root{
  --primary:#2563eb;
  --accent:#f59e0b;
  --danger:#ef4444;
  --success:#22c55e;
  --bg:#f8fafc;
  --card:#ffffff;
  --border:#e5e7eb;
}
*{box-sizing:border-box}

body{
  margin:0;
  padding:24px;
  font-family:system-ui,-apple-system,"Microsoft JhengHei",Segoe UI,Arial;
  background:var(--bg);
  color:#0f172a;
}

.container{
  max-width:900px;
  margin:auto;
  background:var(--card);
  border-radius:16px;
  padding:24px;
  box-shadow:0 20px 40px rgba(0,0,0,.08);
}

.subtitle{color:#475569;margin-bottom:16px}

/* 說明區 */
.principle{
  background:#f1f5f9;
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px 20px;
  margin-bottom:20px;
  font-size:14px;
  line-height:1.7;
}
.principle strong{color:var(--accent)}

/* 資訊列 */
.info-bar{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.info-pill{
  background:#f8fafc;
  border:1px solid var(--border);
  border-radius:9999px;
  padding:6px 14px;
  font-size:13px;
}
.info-pill span{font-weight:700}

/* 步驟訊息 */
.step-msg{
  background:#eff6ff;
  border:1px solid #bfdbfe;
  border-radius:10px;
  padding:10px 18px;
  margin-bottom:18px;
  font-size:14px;
  color:#1e3a8a;
}

/* 圖表 */
.chart-wrap{
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  background:#f8fafc;
}
.bars{
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:8px;
  height:260px;
}
.bar-col{
  width:40px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.bar{
  width:100%;
  background:var(--primary);
  border-radius:6px 6px 0 0;
  transition:.25s;
}
.bar.compare{background:var(--accent)}
.bar.swap{background:var(--danger)}
.bar.sorted{background:var(--success)}
.bar-label{margin-top:6px;font-size:12px}

/* 控制 */
.controls{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:20px 0;
}
button{
  padding:8px 16px;
  border:none;
  border-radius:9999px;
  background:var(--primary);
  color:#fff;
  cursor:pointer;
}
button.secondary{background:#64748b}
button.warn{background:var(--accent)}
button:disabled{opacity:.5}
</style>
</head>

<body>
<div class="container">

<h1>氣泡排序（Bubble Sort）</h1>
<p class="subtitle">視覺化步驟演示</p>

<div class="principle">
<strong>原理：</strong>
重複比較相鄰兩數，順序錯誤即交換，讓最大值逐輪移動至右側。<br><br>
時間複雜度：最佳 O(n)，平均 / 最差 O(n²)
</div>

<div class="info-bar">
  <div class="info-pill">第 <span id="infoPass">0</span> 輪</div>
  <div class="info-pill">比較：<span id="infoCmp">0</span></div>
  <div class="info-pill">交換：<span id="infoSwp">0</span></div>
  <div class="info-pill">狀態：<span id="infoState">就緒</span></div>
</div>

<div class="step-msg" id="stepMsg">按「開始」觀看氣泡排序過程</div>

<div class="chart-wrap">
  <div class="bars" id="bars"></div>
</div>

<div class="controls">
  <button onclick="startAuto()">▶ 開始</button>
  <button onclick="pauseAuto()" class="secondary">⏸ 暫停</button>
  <button onclick="doStep()" class="warn">單步</button>
  <button onclick="resetSort()" class="secondary">重置</button>
  <button onclick="randomArray()" class="secondary">亂數</button>
</div>

</div>

<script>
let arr=[64,34,25,12,22,11,90];
const MAX_H=220;
let steps=[], cnt=0, timer=null;

function computeSteps(a){
  const s=[], data=[...a];
  let cmp=0, sw=0;

  for(let i=0;i<data.length-1;i++){
    for(let j=0;j<data.length-i-1;j++){
      cmp++;
      s.push({arr:[...data], i, j, cmp, sw, phase:"compare",
              msg:`比較 ${data[j]} 與 ${data[j+1]}`});
      if(data[j]>data[j+1]){
        [data[j],data[j+1]]=[data[j+1],data[j]];
        sw++;
        s.push({arr:[...data], i, j, cmp, sw, phase:"swap",
                msg:`交換 ${data[j]} 與 ${data[j+1]}`});
      }
    }
    s.push({arr:[...data], i, cmp, sw, phase:"sorted",
            sortedFrom:data.length-i-1,
            msg:`第 ${i+1} 輪完成，最大值就位`});
  }
  s.push({arr:[...data], cmp, sw, phase:"done", msg:"🎉 排序完成"});
  return s;
}

function render(st){
  const bars=document.getElementById("bars");
  bars.innerHTML="";
  const max=Math.max(...st.arr);

  st.arr.forEach((v,i)=>{
    const col=document.createElement("div");
    col.className="bar-col";

    const bar=document.createElement("div");
    bar.className="bar";
    bar.style.height=`${v/max*MAX_H}px`;

    if(st.phase==="compare"&&(i===st.j||i===st.j+1)) bar.classList.add("compare");
    if(st.phase==="swap"&&(i===st.j||i===st.j+1)) bar.classList.add("swap");
    if(st.phase==="sorted"&&i>=st.sortedFrom) bar.classList.add("sorted");
    if(st.phase==="done") bar.classList.add("sorted");

    const label=document.createElement("div");
    label.className="bar-label";
    label.textContent=v;

    col.append(bar,label);
    bars.appendChild(col);
  });

  infoPass.textContent=st.i!==undefined?st.i+1:"-";
  infoCmp.textContent=st.cmp||0;
  infoSwp.textContent=st.sw||0;
  infoState.textContent=st.phase==="done"?"完成":"排序中";
  stepMsg.textContent=st.msg||"";
}

function doStep(){
  if(cnt>=steps.length) return;
  render(steps[cnt++]);
}

function startAuto(){
  if(timer) return;
  timer=setInterval(()=>{ if(cnt>=steps.length) pauseAuto(); else doStep(); },700);
}

function pauseAuto(){
  clearInterval(timer);
  timer=null;
}

function resetSort(){
  pauseAuto();
  steps=computeSteps(arr);
  cnt=0;
  render({arr});
}

function randomArray(){
  arr=Array.from({length:7},()=>Math.floor(Math.random()*90)+10);
  resetSort();
}

resetSort();
</script>
</body>
</html>
